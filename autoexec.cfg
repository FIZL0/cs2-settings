bind "," "voice_modenable_toggle"
bind "." toggle "snd_musicvolume 0 0.5"
bind "j" "toggle viewmodel_offset_y -2 2"
bind k "playerchatwheel CW.HeardNoise #Chatwheel_heardnoise
bind "/" "toggle cl_crosshair_recoil 0 1"
bind "t" "switchhands"

// GAME SETTINGS
r_fullscreen_gamma 2.5
cl_hide_avatar_images 0
cl_allow_animated_avatars 0
cl_debounce_zoom 0
cl_crosshair_friendly_warning 0
cl_teamcounter_playercount_instead_of_avatars 1
