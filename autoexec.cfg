    bind "a" "+left"
    bind "d" "+right"
    bind "ctrl" "+duck"
    bind "shift" "+sprint"
    bind "r" "+reload"
    bind "e" "+use"
	bind "mwheeldown" "+jump"
	bind mwheelup "+jump"
