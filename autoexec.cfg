joystick 0
mm_dedicated_search_maxping 120
cl_autowepswitch "0"
host_writeconfig
cl_showloadout true
cl_radar_square_with_scoreboard 0
cl_teamid_overhead_fade_near_crosshair 0.800000
cl_weapon_selection_rarity_color true

// RADAR

	bind "x" "toggleradarscale"
	
	cl_radar_scale 0.300000
	cl_radar_scale_alternate 0.800000
	cl_buywheel_nonumberpurchasing true
	cl_teamcounter_playercount_instead_of_avatars true

// VIEWMODEL
 
	viewmodel_fov 68
	viewmodel_offset_x 3
	viewmodel_offset_y 2
	viewmodel_offset_z -2
	cl_bob_lower_amt 5
	cl_bobamt_lat 0.1
	cl_bobamt_vert 0.1
	cl_bobcycle 0.98
	cl_viewmodel_shift_left_amt 0.5
	cl_viewmodel_shift_right_amt 0.25
    
// BINDS

	bind "mouse1" "+attack"
	bind "mouse2" "+attack2"
